name: build-mac

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Source tag/ref to build (e.g. v0.1.2)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-13
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: prins076/boekhouding
          ref: ${{ inputs.ref }}
          token: ${{ secrets.CI_PAT }}

      - name: Set up Node 16.16.0
        uses: actions/setup-node@v4
        with:
          node-version: 16.16.0

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (unsigned, x64)
        run: npx electron-builder --mac --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
